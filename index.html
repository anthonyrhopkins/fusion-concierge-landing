<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fusion Concierge | SAP Concur Fusion Exchange</title>
  <meta name="description" content="SAP Concur Fusion Exchange — 02 de junho de 2026, Grand Hyatt São Paulo. Acesse o Fusion Concierge para explorar sessões, palcos temáticos, keynotes e logística do evento.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://fusion-concierge.cfapps.us10.hana.ondemand.com/">

  <!-- Fast redirect for browsers with JS off -->
  <meta http-equiv="refresh" content="0; url=https://fusion-concierge.cfapps.us10.hana.ondemand.com/">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #0027d2;
      --primary-dark: #00186e;
      --accent: #ffc92b;
      --bg: #0b0f14;
      --card: #161b22;
      --text: #e6edf3;
      --text-muted: #8b949e;
    }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 0.75rem;
    }
    p {
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 1.5rem;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--primary);
      color: white;
      padding: 0.85rem 1.75rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      transition: background 0.18s;
    }
    .cta:hover { background: var(--primary-dark); }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      display: inline-block;
      vertical-align: -3px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">02 jun 2026 · Grand Hyatt São Paulo</div>
    <h1>Redirecionando para o Fusion Concierge</h1>
    <p>O assistente do <strong>SAP Concur Fusion Exchange</strong> está abrindo agora.<br>Se não for redirecionado em alguns segundos, clique no botão abaixo.</p>
    <a class="cta" href="https://fusion-concierge.cfapps.us10.hana.ondemand.com/">
      <span class="spinner"></span>
      Abrir Fusion Concierge
    </a>
  </div>
  <script>
    window.location.replace('https://fusion-concierge.cfapps.us10.hana.ondemand.com/');
  </script>
</body>
</html>
