<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fusion Concierge | SAP Concur Fusion</title>
  <meta name="description" content="SAP Concur Fusion 2026 has concluded. See you in Brazil for the next Fusion event.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #0027d2;
      --primary-dark: #00186e;
      --accent: #ffc92b;
      --bg: #0b0f14;
      --card: #161b22;
      --text: #e6edf3;
      --text-muted: #8b949e;
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0, 39, 210, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(0, 130, 60, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 50% at 20% 100%, rgba(255, 201, 43, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 560px;
      width: 100%;
      padding: 2rem;
      text-align: center;
      animation: fade-up 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* SAP logo mark */
    .logo-mark {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2.5rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1;
    }

    .logo-text .brand {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .logo-text .product {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .logo-text .sub {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 2px;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 0 auto 2rem;
      opacity: 0.8;
    }

    .badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: rgba(255, 201, 43, 0.12);
      color: var(--accent);
      border: 1px solid rgba(255, 201, 43, 0.2);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 1rem;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 2rem;
      max-width: 440px;
      margin-left: auto;
      margin-right: auto;
    }

    /* CTA button */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      border: none;
      cursor: pointer;
      animation: fade-up 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
    }

    .cta:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 39, 210, 0.3);
    }

    .cta:active {
      transform: scale(0.97);
    }

    .cta svg {
      width: 18px;
      height: 18px;
      transition: transform 0.2s ease;
    }

    .cta:hover svg {
      transform: translateX(3px);
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.25rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.6;
    }

    /* Floating dots decoration */
    .dots {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .dot {
      position: absolute;
      border-radius: 50%;
      opacity: 0.07;
      animation: float 20s ease-in-out infinite;
    }

    .dot:nth-child(1) { width: 300px; height: 300px; background: var(--primary); top: -100px; right: -50px; animation-delay: 0s; }
    .dot:nth-child(2) { width: 200px; height: 200px; background: var(--accent); bottom: -80px; left: -40px; animation-delay: -7s; }
    .dot:nth-child(3) { width: 150px; height: 150px; background: #00823c; bottom: 20%; right: 10%; animation-delay: -14s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -30px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.95); }
    }

    @media (max-width: 640px) {
      .container { padding: 1.5rem; }
      .teaser-card { padding: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="container">
    <div class="badge">Event Concluded</div>

    <h1>Thanks for an incredible <span>SAP Concur Fusion 2026</span></h1>

    <p class="subtitle">
      Fusion Concierge helped attendees navigate sessions, speakers, and logistics throughout SAP Concur Fusion 2026 in New Orleans. See you at the next event!
    </p>

    <a href="https://www.concur.com/events" class="cta">
      SAP Concur Events
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
      </svg>
    </a>
  </div>

  <div class="footer">
    &copy; 2026 SAP SE. All rights reserved.
  </div>
</body>
</html>
